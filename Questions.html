<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>

<title>Nosotros ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --rose:#b833b1;--rose-lt:#2a002a;--rose-dk:#e0a0e0;
  --cream:#000000;--ink:#fffdfd;--muted:#a09898;--border:#333;--card:#111;
  --purple:#A87BAF;
  --fd:'Lora',Georgia,serif;--fb:'Inter',system-ui,sans-serif;
}
html{font-size:16px}
body{background:var(--cream);color:var(--ink);font-family:var(--fb);min-height:100vh;display:flex;flex-direction:column;align-items:center}

header{text-align:center;padding:2.5rem 1rem 1.5rem;width:100%}
.ornament{font-size:1.1rem;color:var(--rose);letter-spacing:.5rem;display:block;margin-bottom:.5rem}
header h1{font-family:var(--fd);font-size:clamp(1.9rem,5vw,2.7rem);font-weight:600;letter-spacing:-.02em}
header p{margin-top:.35rem;font-size:.83rem;color:var(--muted);font-weight:300;letter-spacing:.06em}

.sync-bar{width:100%;max-width:620px;padding:0 1.25rem;margin-bottom:.6rem}
.sync-pill{display:inline-flex;align-items:center;gap:.4rem;font-size:.73rem;padding:.3rem .75rem;border-radius:99px;border:1px solid var(--border);color:var(--muted);background:var(--card)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0}
.sync-pill.connected .sync-dot{background:#4caf50;box-shadow:0 0 6px #4caf5088}
.sync-pill.connected{color:#4caf50;border-color:#4caf5044}
.sync-pill.error .sync-dot{background:#e57373}
.sync-pill.error{color:#e57373;border-color:#e5737344}

main{width:100%;max-width:620px;padding:0 1.25rem 5rem}

.who-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.who-label{font-size:.73rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:500;flex-shrink:0}
.who-btns{display:flex;gap:.5rem}
.who-btn{font-family:var(--fb);font-size:.82rem;font-weight:500;cursor:pointer;border:1px solid var(--border);border-radius:8px;padding:.38rem .9rem;background:transparent;color:var(--muted);transition:all .15s}
.who-btn.active-Annie{background:var(--rose);color:#fff;border-color:var(--rose)}
.who-btn.active-david{background:var(--purple);color:#fff;border-color:var(--purple)}
.who-btn:hover{opacity:.85}

.know-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.4rem 1.5rem 1.2rem;margin-bottom:1.2rem;position:relative;overflow:hidden}
.know-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--rose),var(--purple))}
.know-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:.8rem}
.know-label{font-size:.71rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:500;margin-bottom:.2rem}
.know-phrase{font-family:var(--fd);font-style:italic;font-size:.93rem;color:var(--ink)}
.know-pct{font-family:var(--fd);font-size:2.8rem;font-weight:600;color:var(--rose);line-height:1}
.know-pct span{font-size:1rem;color:var(--muted)}
.track{height:6px;background:#1a001a;border-radius:99px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--purple));border-radius:99px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.know-sub{margin-top:.5rem;font-size:.74rem;color:var(--muted);display:flex;justify-content:space-between}

.timer-row{display:flex;align-items:center;gap:.75rem;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.6rem 1rem;margin-bottom:1.2rem}
.timer-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:500;white-space:nowrap}
.t-track{flex:1;height:4px;background:#1a001a;border-radius:99px;overflow:hidden}
.t-fill{height:100%;background:var(--rose);border-radius:99px;transition:width .5s}
.timer-val{font-family:var(--fd);font-size:.93rem;color:var(--rose);font-weight:600;min-width:68px;text-align:right}

.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.8rem 1.6rem 1.5rem;margin-bottom:1.1rem;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--rose),var(--purple))}
.q-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.q-num{font-size:.72rem;color:var(--rose);text-transform:uppercase;letter-spacing:.1em;font-weight:500}
.q-tag{font-size:.7rem;background:var(--rose-lt);color:var(--rose-dk);padding:.2rem .65rem;border-radius:99px;font-weight:500;border:1px solid #3a003a}
.q-text{font-family:var(--fd);font-size:clamp(1.12rem,3vw,1.38rem);line-height:1.62;color:var(--ink)}

.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-bottom:1rem}
@media(max-width:460px){.ans-grid{grid-template-columns:1fr}}
.ans-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.9rem .95rem;transition:border-color .2s}
.ans-card.mine{border-color:var(--rose)}
.ans-card.theirs{border-color:var(--purple)}
.ans-who{font-size:.69rem;font-weight:500;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:.4rem;display:flex;align-items:center;gap:.35rem}
.dot{width:7px;height:7px;border-radius:50%;background:var(--rose);display:inline-block;flex-shrink:0}
.dot.b{background:var(--purple)}
textarea{width:100%;min-height:80px;resize:vertical;border:1px solid var(--border);border-radius:8px;padding:.55rem .72rem;font-family:var(--fb);font-size:.87rem;color:var(--ink);background:#0a000a;line-height:1.5;outline:none;transition:border-color .15s}
textarea:focus{border-color:var(--rose)}
.their-answer{min-height:60px;font-size:.87rem;color:var(--muted);line-height:1.55;font-style:italic;padding:.4rem 0}
.their-answer.empty{color:#444;font-size:.8rem}

.actions{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:2.5rem}
button{font-family:var(--fb);font-size:.84rem;font-weight:500;cursor:pointer;border:none;border-radius:8px;padding:.55rem 1.1rem;transition:opacity .15s,transform .1s}
button:active{transform:scale(.97)}
.btn-p{background:var(--rose);color:#fff}
.btn-p:hover{opacity:.87}
.btn-s{background:var(--rose-lt);color:var(--rose-dk)}
.btn-s:hover{opacity:.8}

.hist-title{font-family:var(--fd);font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
.hist-title::after{content:'';flex:1;height:1px;background:var(--border)}
.hist-item{border-left:2px solid var(--border);padding:.65rem .9rem;margin-bottom:.7rem;position:relative}
.hist-item::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--rose-lt);border:2px solid var(--rose);position:absolute;left:-5px;top:.8rem}
.hist-q{font-family:var(--fd);font-style:italic;font-size:.87rem;color:var(--ink);margin-bottom:.28rem}
.hist-ans{font-size:.79rem;color:var(--muted);line-height:1.65}
.hist-ans b{color:var(--ink)}
.hist-meta{font-size:.68rem;color:#444;margin-top:.25rem}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(14px);background:#222;color:#fff;border:1px solid var(--border);padding:.58rem 1.1rem;border-radius:99px;font-size:.82rem;opacity:0;transition:all .28s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

function setSync(status, txt){
  $('sync-pill').className = 'sync-pill ' + status;
  $('sync-txt').textContent = txt;
}

function phrase(p){
  let t=PHRASES[0][1];
  for(const[n,v] of PHRASES) if(p>=n) t=v;
  return t;
}

// ── Quién soy ──
window.setWho = w => {
  who = w;
  localStorage.setItem('nosotros_who', w);
  renderWho();
  if(S) renderAnswers();
};

function renderWho(){
  $('btn-Annie').className  = 'who-btn'+(who==='Annie'  ? ' active-Annie'  : '');
  $('btn-david').className = 'who-btn'+(who==='david' ? ' active-david' : '');
  $('who-status').textContent = who
    ? 'Respondiendo como '+(who==='Annie'?'Annie':'David')
    : 'Elige quién eres';
}

// ── Firebase listener — todo parte de aquí ──
onValue(ref(db,'state'), snap => {
  const val = snap.val();
  if(!val){
    // Primera vez: inicializar estado
    const idx = randIdx([]);
    set(ref(db,'state'), {
      idx, used:[idx], lastTime:Date.now(),
      pending:true, history:[], aAnnie:'', aDavid:''
    });
    return;
  }
  S = val;
  if(!S.history) S.history = [];
  setSync('connected','Sincronizado ✓');
  renderAll();
}, err => {
  setSync('error','Error de conexión');
  console.error(err);
});

function randIdx(used){
  const s = new Set(used||[]);
  const a = QS.map((_,i)=>i).filter(i=>!s.has(i));
  return a.length ? a[Math.floor(Math.random()*a.length)] : null;
}

function renderAll(){
  renderProgress();
  renderQuestion();
  renderAnswers();
  renderHistory();
}

function renderProgress(){
  const done=S.history.length, total=QS.length;
  const pct=Math.round(done/total*100);
  $('know-pct').innerHTML=pct+'<span>%</span>';
  $('know-fill').style.width=pct+'%';
  $('know-phrase').textContent=phrase(pct);
  $('know-ans').textContent=done+(done===1?' pregunta respondida':' preguntas respondidas');
  $('know-rem').textContent=(total-done)+' restantes';
}

function renderQuestion(){
  const i=S.idx;
  if(i===null){
    $('q-text').textContent='¡Completaron las 100 preguntas! Se conocen de alma a alma 🎉';
    $('q-tag').textContent=''; $('q-num').textContent='¡Completado!';
    return;
  }
  const q=QS[i], num=(S.used||[]).indexOf(i)+1;
  $('q-text').textContent=q.q;
  $('q-tag').textContent=q.c;
  $('q-num').textContent='Pregunta #'+num+' de 100';
}

function renderAnswers(){
  if(!S) return;
  const nw=$('Annie-wrap'), dw=$('david-wrap');

  if(who==='Annie'){
    nw.innerHTML=`<textarea id="a-Annie" placeholder="Tu respuesta…"></textarea>`;
    $('a-Annie').value=S.aAnnie||'';
    $('card-Annie').className='ans-card mine';
    dw.innerHTML=S.aDavid
      ?`<div class="their-answer">${S.aDavid}</div>`
      :`<div class="their-answer empty">David aún no ha respondido…</div>`;
    $('card-david').className='ans-card theirs';
  } else if(who==='david'){
    dw.innerHTML=`<textarea id="a-david" placeholder="Tu respuesta…"></textarea>`;
    $('a-david').value=S.aDavid||'';
    $('card-david').className='ans-card mine';
    nw.innerHTML=S.aAnnie
      ?`<div class="their-answer">${S.aAnnie}</div>`
      :`<div class="their-answer empty">Annie aún no ha respondido…</div>`;
    $('card-Annie').className='ans-card theirs';
  } else {
    // nadie elegido — mostrar ambos como lectura
    nw.innerHTML=S.aAnnie?`<div class="their-answer">${S.aAnnie}</div>`:`<div class="their-answer empty">Sin respuesta aún…</div>`;
    dw.innerHTML=S.aDavid?`<div class="their-answer">${S.aDavid}</div>`:`<div class="their-answer empty">Sin respuesta aún…</div>`;
    $('card-Annie').className='ans-card';
    $('card-david').className='ans-card';
  }
}

window.save = () => {
  if(!S){ showToast('Sin conexión'); return; }
  if(!who){ showToast('Primero elige quién eres'); return; }
  const ta = $(who==='Annie'?'a-Annie':'a-david');
  if(!ta){ showToast('Campo no encontrado'); return; }
  const ans = ta.value.trim();
  if(!ans){ showToast('Escribe tu respuesta primero'); return; }

  const ns = {...S};
  if(who==='Annie') ns.aAnnie=ans; else ns.aDavid=ans;

  // Si los dos ya respondieron → al historial
  if(ns.aAnnie && ns.aDavid && ns.pending){
    const q=QS[ns.idx];
    const entry={
      question:q.q, category:q.c,
      aAnnie:ns.aAnnie, aDavid:ns.aDavid,
      date:new Date().toLocaleDateString('es-CO',{day:'numeric',month:'long',year:'numeric'}),
      ts:Date.now()
    };
    const h=[...(ns.history||[])];
    const ex=h.findIndex(x=>x.question===q.q);
    if(ex>=0) h[ex]=entry; else h.unshift(entry);
    ns.history=h;
    ns.pending=false;
  }

  set(ref(db,'state'), ns).then(()=>{
    const both = ns.aAnnie && ns.aDavid;
    showToast(both ? '✓ ¡Los dos respondieron!' : '✓ Respuesta guardada — esperando al otro');
  });
};

window.skip = () => {
  if(!S){ showToast('Sin conexión'); return; }
  if((S.aAnnie||S.aDavid) && !confirm('¿Siguiente pregunta? Las respuestas actuales se perderán.')) return;
  const used=[...(S.used||[])];
  const idx=randIdx(used);
  if(idx!==null) used.push(idx);
  set(ref(db,'state'),{...S, idx, used, lastTime:Date.now(), pending:true, aAnnie:'', aDavid:''});
};

function renderHistory(){
  const sec=$('hist-sec'), list=$('hist-list');
  const hist=S.history||[];
  if(!hist.length){sec.style.display='none';return;}
  sec.style.display='block';
  list.innerHTML=hist.map(h=>`
    <div class="hist-item">
      <div class="hist-q">"${h.question}"</div>
      <div class="hist-ans">
        ${h.aAnnie  ?`<b>Annie:</b> ${h.aAnnie}<br/>`:''}
        ${h.aDavid ?`<b>David:</b> ${h.aDavid}`:''}
      </div>
      <div class="hist-meta">${h.date||''} · ${h.category||''}</div>
    </div>`).join('');
}

// ── Timer ──
setInterval(()=>{
  if(!S){ $('t-val').textContent='--:--:--'; return; }
  const rem=Math.max(0,(S.lastTime||Date.now())+INTERVAL-Date.now());
  const h=Math.floor(rem/3600000),m=Math.floor(rem%3600000/60000),sc=Math.floor(rem%60000/1000);
  $('t-val').textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0');
  $('t-fill').style.width=(S.pending?100:Math.min(100,(INTERVAL-rem)/INTERVAL*100))+'%';
  if(!S.pending && rem===0) window.skip();
},1000);

function showToast(msg){
  const t=$('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2700);
}

// ── Boot ──
document.addEventListener('DOMContentLoaded',()=>{
  renderWho();
  setSyncStatus('','Conectando…');
});

function setSyncStatus(s,t){ setSync(s,t); }
</script>
</body>
</html>
